<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, width=device-width">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta http-equiv="Content-Language" content="zh-cn">
<meta name="renderer" content="webkit">
<title>支付宝扫码支付</title>
<link href="/static/css/alipay_pay.css?v=1" rel="stylesheet" media="screen">
</head>
<body>
<img src="/static/img/guide1.png" alt="引导图" class="top-guide" style="max-width: 100%;margin: auto;display:none">
<div class="guide" style="display:none"><img src="/static/img/guide2.png" alt="引导图" style="width: 96%;"></div>
<div class="body">
<h1 class="mod-title">
<span class="ico-wechat"></span><span class="text">支付宝扫码支付</span>
</h1>
<div class="mod-ct">
<div class="order">
</div>
<div class="amount">¥{$order.realmoney}</div>
<div class="qr-container">
<div class="qr-image" id="qrcode">
</div>
<div class="qr-expired-overlay" id="qrExpiredOverlay">
    <div class="qr-expired-icon">×</div>
    <div class="qr-expired-text">二维码已失效</div>
    <div class="qr-expired-text">请返回重新发起支付</div>
</div>
</div>
<div class="countdown-container">
    <div class="countdown-title">支付剩余时间</div>
    <div class="countdown-timer">
        <div class="countdown-box">
            <span id="hours">00</span>
            <span class="countdown-label">时</span>
        </div>
        <div class="countdown-box">
            <span id="minutes">00</span>
            <span class="countdown-label">分</span>
        </div>
        <div class="countdown-box">
            <span id="seconds">00</span>
            <span class="countdown-label">秒</span>
        </div>
    </div>
</div>
<div class="open_app" style="display: none;">
    <a class="btn-open-app">打开支付宝APP继续付款</a><br/><br/><br/>
	<a onclick="checkresult()" class="btn-check">我已付款，返回查看订单</a>
</div>
<div class="detail" id="orderDetail">
<dl class="detail-ct" style="display: none;">
<dt>购买物品</dt>
<dd id="productName">{$order.name}</dd>
<dt>商户订单号</dt>
<dd id="billId">{$order.trade_no}</dd>
<dt>创建时间</dt>
<dd id="createTime">{$order.addtime}</dd>
</dl>
<a href="javascript:void(0)" class="arrow"><i class="ico-arrow"></i></a>
</div>
<div class="tip">
<span class="dec dec-left"></span>
<span class="dec dec-right"></span>
<div class="ico-scan"></div>
<div class="tip-text">
<p>请使用支付宝扫一扫</p>
<p>扫描二维码完成支付</p>
</div>
</div>
<div class="tip-text">
</div>
</div>
<script src="{$cdnpublic}jquery/1.12.4/jquery.min.js"></script>
<script src="{$cdnpublic}layer/3.1.1/layer.js"></script>
<script src="{$cdnpublic}jquery.qrcode/1.0/jquery.qrcode.min.js"></script>
<script>
	var code_url = '{$code_url}';
    var url_scheme = 'alipays://platformapi/startapp?saId=10000007&qrcode=' + encodeURIComponent(code_url);
    $('#qrcode').qrcode({
        text: code_url,
        width: 230,
        height: 230,
        foreground: "#000000",
        background: "#ffffff",
        typeNumber: -1
    });
    // 订单详情
    $('#orderDetail .arrow').click(function (event) {
        if ($('#orderDetail').hasClass('detail-open')) {
            $('#orderDetail .detail-ct').slideUp(500, function () {
                $('#orderDetail').removeClass('detail-open');
            });
        } else {
            $('#orderDetail .detail-ct').slideDown(500, function () {
                $('#orderDetail').addClass('detail-open');
            });
        }
    });
    function loadmsg() {
        $.ajax({
            type: "GET",
            dataType: "json",
            url: "/payment/check_status",
            data: {trade_no: "{$order.trade_no}"},
            success: function (data) {
                if (data.code == 1) {
					layer.msg('支付成功，正在跳转中...', {icon: 16,shade: 0.1,time: 15000});
					setTimeout(window.location.href=data.backurl, 1000);
                }else{
                    setTimeout("loadmsg()", 2000);
                }
            },
            error: function () {
                setTimeout("loadmsg()", 2000);
            }
        });
    }
	function checkresult() {
        $.ajax({
            type: "GET",
            dataType: "json",
            url: "/payment/check_status",
            data: {trade_no: "{$order.trade_no}"},
            success: function (data) {
                if (data.code == 1) {
                    layer.msg('支付成功，正在跳转中...', {icon: 16,shade: 0.1,time: 15000});
					setTimeout(window.location.href=data.backurl, 1000);
                }else{
					layer.msg('您还未完成付款，请继续付款', {shade: 0,time: 1500});
				}
            },
            error: function () {
                layer.msg('服务器错误');
            }
        });
    }
	var isMobile = function (){
		var ua = navigator.userAgent;
		var ipad = ua.match(/(iPad).*OS\s([\d_]+)/),
		isIphone =!ipad && ua.match(/(iPhone\sOS)\s([\d_]+)/),
		isAndroid = ua.match(/(Android)\s+([\d.]+)/);
		return isIphone || isAndroid;
	}
    function wx_open(){
        $(".guide").show();
    }
	window.onload = function(){
        if(isMobile()){
            window.onpopstate=function (e) {
                if(e.state=='forward' || confirm('是否取消支付并返回？')){
                    window.history.back();
                }else{
                    e.preventDefault();
                    window.history.pushState('forward', null, '');
                }
            };
            window.history.pushState('forward', null, '');
        }
		if(isMobile() && code_type==0){
			$('.open_app').show();
            if(navigator.userAgent.indexOf('MicroMessenger/')>0){
                $(".top-guide").show();
                $('.btn-open-app').attr('href', 'javascript:wx_open()');
            }else{
                $('.btn-open-app').attr('href', url_scheme)
                if(navigator.userAgent.indexOf('EdgA/')==-1 && $(window).height() > $(window).width()){
                    setTimeout(window.location.href = url_scheme, 1000);
                }
            }
		}
        $("body").click(function(){
            if (!$(".guide").is(":hidden")) {
                $(".guide").hide();
            }
        });
		setTimeout("loadmsg()", 2000);
        startCountdown('{$expires_in}');
	}

    // 倒计时功能
    function startCountdown(duration) {
        if (duration === '') return;
        $(".countdown-container").show();
        var timer = parseInt(duration);
        if(duration <= 0){
            $("#qrExpiredOverlay").show();
            $('.btn-open-app').attr('href', 'javascript:alert("订单已超时")');
            return;
        }

        var countdown = function() {
            var hours = Math.floor(timer / 3600);
            var minutes = Math.floor((timer % 3600) / 60);
            var seconds = timer % 60;
            hours = hours < 10 ? "0" + hours : hours;
            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;
            $("#hours").text(hours);
            $("#minutes").text(minutes);
            $("#seconds").text(seconds);
            if (--timer < 0) {
                clearInterval(window.countdownInterval);
                $("#qrExpiredOverlay").show();
                $('.btn-open-app').attr('href', 'javascript:alert("订单已超时")');
            }
        }
        countdown();
        window.countdownInterval = setInterval(countdown, 1000);
    }
</script>
</body>
</html>
